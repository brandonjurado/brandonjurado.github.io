name: Check Format
on:
  push:
  pull_request:
    branches:
      - main
jobs:
  check-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.0

      - name: Install 🔧 # Install dependencies
        run: |
          bun install --frozen-lockfile

      - name: Check Format
        run: |
          bun run check-format
